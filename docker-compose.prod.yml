# ==============================================================================
# Hubstream — Production Docker Compose (CI/CD Optimized)
# ==============================================================================
services:

  # ── SFU / Signaling Backend ──────────────────────────────────────────────────
  server:
    image: ${SERVER_IMAGE} # Injected dynamically via the .env.prod file
    restart: always
    network_mode: host
    security_opt:
      - seccomp:unconfined
    env_file: .env.prod
    volumes:
      - ./log:/app/log
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Next.js Frontend ─────────────────────────────────────────────────────────
  client:
    image: ${CLIENT_IMAGE} # Injected dynamically via the .env.prod file
    restart: always
    ports:
      - "80:3000"
    extra_hosts:
      - "server:host-gateway"
    env_file: .env.prod
    depends_on:
      - server
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── cAdvisor / Hardware Metrics Exporter ──────────────────────────────────────
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: always
    ports:
      - "8080:8080" # Exposed to the host so your Kubernetes Prometheus can scrape it
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    devices:
      - /dev/kmsg
