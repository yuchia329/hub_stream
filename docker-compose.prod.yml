# ==============================================================================
# Facetime — Production Docker Compose (CI/CD Optimized)
# ==============================================================================
services:

  # ── SFU / Signaling Backend ──────────────────────────────────────────────────
  server:
    image: ${SERVER_IMAGE} # Injected dynamically via the .env.prod file
    restart: always
    network_mode: host
    environment:
      - PORT=4000
      - NODE_ENV=production
      - MEDIASOUP_LISTEN_IP=0.0.0.0
      - MEDIASOUP_ANNOUNCED_IP=${PUBLIC_IP}
      - CLIENT_ORIGIN=https://facetime.yuchia.dev # Replace this with your domain
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Next.js Frontend ─────────────────────────────────────────────────────────
  client:
    image: ${CLIENT_IMAGE} # Injected dynamically via the .env.prod file
    restart: always
    ports:
      - "80:3000"
    environment:
      - NODE_ENV=production
      - BACKEND_URL=http://server:4000
    depends_on:
      - server
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
